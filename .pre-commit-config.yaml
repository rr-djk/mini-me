repos:
  # Secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: Gitleaks (Détection de secrets)
        description: Détecte les secrets, clés d'API et mots de passe avant le commit.
        entry: gitleaks protect --staged --verbose

  # Linter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        name: Ruff (Lint & Complexité)
        description: Vérifie les erreurs de syntaxe, imports, et complexité cyclomatique ≤ 7.
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: Ruff (Format)
        description: Formate le code automatiquement (Black-compatible).

  # Type checker
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.410
    hooks:
      - id: pyright
        name: Pyright (Typage statique)
        description: Vérifie les types, les appels de fonction et les valeurs None non gérées.

