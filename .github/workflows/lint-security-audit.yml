name: Code Quality and Security
on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check
      - run: uv run pyright
      - run: uv lock --check
      - run: uv audit

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/python p/security-audit
